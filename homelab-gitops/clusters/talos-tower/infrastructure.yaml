apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-cilium
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  path: ./infrastructure/cilium
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-network
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  dependsOn:
    - name: infra-cilium
  path: ./infrastructure/network
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-nvidia
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  dependsOn:
    - name: infra-cilium
  path: ./infrastructure/nvidia
  sourceRef:
    kind: GitRepository
    name: flux-system
---
# Suspended by default because the authored UserVolumeConfig selectors target
# non-system data disks and must be explicitly confirmed before first apply.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-storage
  namespace: flux-system
spec:
  suspend: true
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  dependsOn:
    - name: infra-cilium
  path: ./infrastructure/storage
  sourceRef:
    kind: GitRepository
    name: flux-system
---
# Suspended until storage is live and the router DNS cutover window is chosen.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-dns
  namespace: flux-system
spec:
  suspend: true
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  dependsOn:
    - name: infra-network
    - name: infra-storage
  path: ./infrastructure/dns
  sourceRef:
    kind: GitRepository
    name: flux-system
