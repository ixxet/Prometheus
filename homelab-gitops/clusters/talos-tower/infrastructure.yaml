apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-cilium
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  path: ./homelab-gitops/infrastructure/cilium
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-network
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  dependsOn:
    - name: infra-cilium
  path: ./homelab-gitops/infrastructure/network
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-nvidia
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  dependsOn:
    - name: infra-cilium
  path: ./homelab-gitops/infrastructure/nvidia
  sourceRef:
    kind: GitRepository
    name: flux-system
---
# Suspended by default because storage is still a deliberate safety gate. The
# first-wave path uses a Talos directory-backed user volume on the system SSD.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-storage
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  dependsOn:
    - name: infra-cilium
  path: ./homelab-gitops/infrastructure/storage
  sourceRef:
    kind: GitRepository
    name: flux-system
---
# Enabled once the local-path PVC flow is validated and Flux can decrypt the
# Postgres credentials with SOPS.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-postgres
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: infra-storage
  path: ./homelab-gitops/infrastructure/postgres
  sourceRef:
    kind: GitRepository
    name: flux-system
---
# Enabled once storage is live. Router DNS cutover remains a separate manual
# step after AdGuard is healthy.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-dns
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  dependsOn:
    - name: infra-network
    - name: infra-storage
  path: ./homelab-gitops/infrastructure/dns
  sourceRef:
    kind: GitRepository
    name: flux-system
