# Suspended until storage, Postgres, and the first stateful AI workloads are
# intentionally brought under Flux control.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  suspend: true
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  prune: true
  wait: true
  dependsOn:
    - name: infra-network
    - name: infra-nvidia
    - name: infra-storage
    - name: infra-postgres
  path: ./apps
  sourceRef:
    kind: GitRepository
    name: flux-system
