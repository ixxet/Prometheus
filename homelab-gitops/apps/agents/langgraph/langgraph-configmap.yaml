apiVersion: v1
kind: ConfigMap
metadata:
  name: langgraph-config
  namespace: agents
data:
  PORT: "8000"
  DATABASE_HOST: postgres.agents.svc.cluster.local
  DATABASE_PORT: "5432"
  OPENAI_API_BASE_URL: http://vllm.ai.svc.cluster.local:8000/v1
  OPENAI_MODEL: mistralai/Mistral-7B-Instruct-v0.3
  LANGGRAPH_SYSTEM_PROMPT: >-
    You are the Prometheus local agent runtime. Be concise, factual, and safe.
    Use the conversation history, answer directly, and do not claim to have
    performed external actions you did not actually perform.
  # v0.4.0 seams are authored in the service, but live rollout stays on no-op
  # providers until Mem0 and the external archive sink are actually deployed.
  SEMANTIC_MEMORY_PROVIDER: none
  SEMANTIC_MEMORY_USER_ID: prometheus-operator
  SEMANTIC_MEMORY_AGENT_ID: langgraph
  SEMANTIC_MEMORY_TOP_K: "3"
  MEM0_QDRANT_HOST: qdrant.semantic-memory.svc.cluster.local
  MEM0_QDRANT_PORT: "6333"
  MEM0_QDRANT_COLLECTION: prometheus-memory
  MEM0_EMBEDDING_DIMS: "384"
  MEM0_EMBEDDER_MODEL: tei
  MEM0_EMBEDDER_BASE_URL: http://tei-embeddings.semantic-memory.svc.cluster.local/v1
  ARCHIVE_SINK: none
