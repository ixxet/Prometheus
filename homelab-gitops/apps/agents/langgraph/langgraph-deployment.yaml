# First OSS LangGraph runtime. Postgres is the only durable store for v0.3.0.
# Pin to an immutable image tag until image automation exists for this service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langgraph
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langgraph
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langgraph
      annotations:
        # ConfigMap updates from envFrom do not restart the pod by themselves.
        prometheus.ixxet.dev/runtime-config-rev: "2026-03-26-archive-sink"
    spec:
      serviceAccountName: agents-ghcr
      enableServiceLinks: false
      containers:
        - name: langgraph
          image: ghcr.io/ixxet/prometheus-langgraph:sha-d0e3c136cded4ebf5fcf6b397ae6f6dbc8cd5efa
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: langgraph-config
          env:
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: password
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: database
          volumeMounts:
            - name: archive-export
              mountPath: /exports/obsidian
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: archive-export
          persistentVolumeClaim:
            claimName: langgraph-archive
