apiVersion: apps/v1
kind: Deployment
metadata:
  name: athena-edge-proxy
  namespace: athena
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: athena-edge-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: athena-edge-proxy
        app.kubernetes.io/part-of: ashton
    spec:
      enableServiceLinks: false
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: nginx-config
          configMap:
            name: athena-edge-proxy-nginx
