apiVersion: batch/v1
kind: Job
metadata:
  name: athena-migrate-v0-8-2-r1
  namespace: athena
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: athena-migrate
        app.kubernetes.io/part-of: ashton
    spec:
      enableServiceLinks: false
      restartPolicy: Never
      serviceAccountName: athena
      containers:
        - name: migrate
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /migrations/migrate.sh
          env:
            - name: ATHENA_EDGE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: athena-edge-runtime
                  key: ATHENA_EDGE_POSTGRES_DSN
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: migrations
          configMap:
            name: athena-migrate-v0-8-2-r1
