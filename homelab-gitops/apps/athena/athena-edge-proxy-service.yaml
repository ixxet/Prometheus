apiVersion: v1
kind: Service
metadata:
  name: athena-edge-proxy
  namespace: athena
  labels:
    app.kubernetes.io/name: athena-edge-proxy
    app.kubernetes.io/part-of: ashton
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: athena-edge-proxy
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
