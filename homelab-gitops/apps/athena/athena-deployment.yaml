apiVersion: apps/v1
kind: Deployment
metadata:
  name: athena
  namespace: athena
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: athena
  template:
    metadata:
      labels:
        app.kubernetes.io/name: athena
        app.kubernetes.io/part-of: ashton
    spec:
      enableServiceLinks: false
      serviceAccountName: athena
      containers:
        - name: athena
          image: ghcr.io/ixxet/athena:v0.8.2@sha256:6524994c2c30bfd227b684b9144b95a798e3e46e600ac5da46df2a600dfd271d
          imagePullPolicy: IfNotPresent
          args:
            - serve
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TZ
              value: "America/Toronto"
            - name: ATHENA_HTTP_ADDR
              value: ":8080"
            - name: ATHENA_NATS_URL
              value: "nats://nats.agents.svc.cluster.local:4222"
            - name: ATHENA_IDENTIFIED_PUBLISH_INTERVAL
              value: "24h"
            - name: ATHENA_EDGE_OCCUPANCY_PROJECTION
              value: "true"
            - name: ATHENA_EDGE_POLICY_ACCEPTANCE_ENABLED
              value: "true"
            - name: ATHENA_EDGE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: athena-edge-runtime
                  key: ATHENA_EDGE_POSTGRES_DSN
            - name: ATHENA_EDGE_HASH_SALT
              valueFrom:
                secretKeyRef:
                  name: athena-edge-runtime
                  key: ATHENA_EDGE_HASH_SALT
            - name: ATHENA_EDGE_TOKENS
              valueFrom:
                secretKeyRef:
                  name: athena-edge-runtime
                  key: ATHENA_EDGE_TOKENS
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
