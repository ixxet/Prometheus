apiVersion: apps/v1
kind: Deployment
metadata:
  name: athena
  namespace: athena
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: athena
  template:
    metadata:
      labels:
        app.kubernetes.io/name: athena
        app.kubernetes.io/part-of: ashton
    spec:
      enableServiceLinks: false
      containers:
        - name: athena
          image: ghcr.io/ixxet/athena:0.4.0@sha256:8fcf9b9cff28a3c417771d350cfb9d02ecb865507aa48f7c3ac9cc7d4b7cdc19
          imagePullPolicy: IfNotPresent
          args:
            - serve
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ATHENA_HTTP_ADDR
              value: ":8080"
            - name: ATHENA_ADAPTER
              value: "mock"
            - name: ATHENA_NATS_URL
              value: "nats://nats.agents.svc.cluster.local:4222"
            - name: ATHENA_IDENTIFIED_PUBLISH_INTERVAL
              value: "24h"
            - name: ATHENA_MOCK_FACILITY_ID
              value: "ashtonbee"
            - name: ATHENA_MOCK_ENTRIES
              value: "12"
            - name: ATHENA_MOCK_EXITS
              value: "3"
            - name: ATHENA_MOCK_IDENTIFIED_TAG_HASHES
              value: "tag_tracer2_001"
            - name: ATHENA_MOCK_IDENTIFIED_EXIT_TAG_HASHES
              value: "tag_tracer2_001"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
