apiVersion: apps/v1
kind: Deployment
metadata:
  name: athena-edge-tunnel
  namespace: athena
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: athena-edge-tunnel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: athena-edge-tunnel
        app.kubernetes.io/part-of: ashton
    spec:
      enableServiceLinks: false
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.3.0
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - --url
            - http://athena-edge-proxy.athena.svc.cluster.local:8080
          ports:
            - name: metrics
              containerPort: 2000
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
