apiVersion: apps/v1
kind: Deployment
metadata:
  name: summarizer
  namespace: summarizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: summarizer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: summarizer
        app.kubernetes.io/part-of: user-adaptive-summarization
    spec:
      enableServiceLinks: false
      containers:
        - name: summarizer
          image: ghcr.io/ixxet/uas-api:sha-35c806fb1c1c
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: USE_MOCK_LLM
              value: "0"
            - name: VLLM_BASE_URL
              value: http://vllm.ai.svc.cluster.local:8000/v1
            - name: VLLM_API_KEY
              value: EMPTY
            - name: VLLM_MODEL
              value: mistralai/Mistral-7B-Instruct-v0.3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
