apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: ai
spec:
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      enableServiceLinks: false
      runtimeClassName: nvidia
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.7.3
          command:
            - vllm
            - serve
            - mistralai/Mistral-7B-Instruct-v0.3
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --tokenizer-mode
            - mistral
            - --dtype
            - bfloat16
            - --gpu-memory-utilization
            - "0.85"
            - --download-dir
            - /var/cache/huggingface
          env:
            - name: HF_HOME
              value: /var/cache/huggingface
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "0"
            - name: HF_HUB_DISABLE_XET
              value: "1"
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /v1/models
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          volumeMounts:
            - name: cache
              mountPath: /var/cache/huggingface
          resources:
            requests:
              cpu: 2000m
              memory: 12Gi
              nvidia.com/gpu: 1
            limits:
              memory: 24Gi
              nvidia.com/gpu: 1
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: vllm-cache
