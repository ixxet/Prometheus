apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: ai
spec:
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      enableServiceLinks: false
      runtimeClassName: nvidia
      initContainers:
        - name: fetch-gemma-gguf
          image: busybox:1.36
          command:
            - sh
            - -ec
            - |
              set -eu
              mkdir -p /var/cache/huggingface/gguf
              target=/var/cache/huggingface/gguf/google_gemma-4-26B-A4B-it-Q6_K.gguf
              if [ ! -s "${target}" ]; then
                wget -O "${target}.part" "https://huggingface.co/bartowski/google_gemma-4-26B-A4B-it-GGUF/resolve/main/google_gemma-4-26B-A4B-it-Q6_K.gguf"
                mv "${target}.part" "${target}"
              fi
          volumeMounts:
            - name: cache
              mountPath: /var/cache/huggingface
      containers:
        - name: vllm
          image: ghcr.io/ixxet/prometheus-vllm-gemma4:sha-025543672b0bbd8815416e887b05c966c8e9a06b
          command:
            - vllm
            - serve
            - /var/cache/huggingface/gguf/google_gemma-4-26B-A4B-it-Q6_K.gguf
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --served-model-name
            - google/gemma-4-26B-A4B-it
            - --tokenizer
            - google/gemma-4-26B-A4B-it
            - --hf-config-path
            - google/gemma-4-26B-A4B-it
            - --gpu-memory-utilization
            - "0.95"
            - --max-model-len
            - "16384"
            - --kv-cache-dtype
            - fp8
            - --moe-backend
            - marlin
            - --enforce-eager
            - --tensor-parallel-size
            - "1"
            - --enable-auto-tool-choice
            - --tool-call-parser
            - gemma4
            - --reasoning-parser
            - gemma4
            - --limit-mm-per-prompt
            - image=0,audio=0
            - --download-dir
            - /var/cache/huggingface
          env:
            - name: HF_HOME
              value: /var/cache/huggingface
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "0"
            - name: HF_HUB_DISABLE_XET
              value: "1"
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /v1/models
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          volumeMounts:
            - name: cache
              mountPath: /var/cache/huggingface
          resources:
            requests:
              cpu: 2000m
              memory: 12Gi
              nvidia.com/gpu: 1
            limits:
              memory: 24Gi
              nvidia.com/gpu: 1
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: vllm-cache
