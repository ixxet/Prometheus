apiVersion: v1
kind: PersistentVolume
metadata:
  name: llama-gemma4-cache-pv
spec:
  capacity:
    storage: 30Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: llama-gemma4-static
  volumeMode: Filesystem
  hostPath:
    path: /var/mnt/local-path-provisioner/llama-gemma4-cache
    type: DirectoryOrCreate
