apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: semantic-memory
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qdrant
    spec:
      enableServiceLinks: false
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.17.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6333
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
      volumes:
        - name: qdrant-data
          persistentVolumeClaim:
            claimName: qdrant-data
