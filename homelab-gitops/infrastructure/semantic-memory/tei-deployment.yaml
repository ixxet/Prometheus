apiVersion: apps/v1
kind: Deployment
metadata:
  name: tei-embeddings
  namespace: semantic-memory
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tei-embeddings
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tei-embeddings
    spec:
      enableServiceLinks: false
      containers:
        - name: tei
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
          imagePullPolicy: IfNotPresent
          args:
            - --model-id
            - BAAI/bge-small-en-v1.5
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: tei-cache
              mountPath: /data
      volumes:
        - name: tei-cache
          persistentVolumeClaim:
            claimName: tei-cache
