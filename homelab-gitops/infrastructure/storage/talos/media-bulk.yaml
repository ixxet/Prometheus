# DANGEROUS: Talos machine config, not a Kubernetes manifest.
# Parked until a disposable bulk disk or NAS-backed bulk tier exists.
apiVersion: v1alpha1
kind: UserVolumeConfig
name: media-bulk
provisioning:
  diskSelector:
    match: disk.transport == 'sata' && disk.rotational && disk.wwid == 'naa.5000c5006630f225'
  minSize: 700GiB
  maxSize: 900GiB
filesystem:
  type: xfs
