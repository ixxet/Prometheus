apiVersion: v1
kind: Service
metadata:
  name: source-controller-metrics
  namespace: flux-system
  labels:
    app.kubernetes.io/name: source-controller
    app.kubernetes.io/component: source-controller
    app.kubernetes.io/part-of: flux
spec:
  type: ClusterIP
  selector:
    app: source-controller
  ports:
    - name: http-metrics
      port: 8080
      targetPort: http-prom
      protocol: TCP
