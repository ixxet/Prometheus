apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dcgm-exporter
  namespace: observability
spec:
  interval: 30m
  releaseName: dcgm-exporter
  targetNamespace: observability
  chart:
    spec:
      chart: dcgm-exporter
      version: 4.8.1
      sourceRef:
        kind: HelmRepository
        name: gpu-helm-charts
        namespace: observability
      interval: 12h
  values:
    runtimeClassName: nvidia
    serviceMonitor:
      enabled: true
      interval: 15s
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 512Mi
