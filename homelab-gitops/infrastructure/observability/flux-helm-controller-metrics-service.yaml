apiVersion: v1
kind: Service
metadata:
  name: helm-controller-metrics
  namespace: flux-system
  labels:
    app.kubernetes.io/name: helm-controller
    app.kubernetes.io/component: helm-controller
    app.kubernetes.io/part-of: flux
spec:
  type: ClusterIP
  selector:
    app: helm-controller
  ports:
    - name: http-metrics
      port: 8080
      targetPort: http-prom
      protocol: TCP
