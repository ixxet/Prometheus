apiVersion: v1
kind: Service
metadata:
  name: adguard-home
  namespace: dns
  annotations:
    lbipam.cilium.io/ips: 192.168.50.200
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: adguard-home
  ports:
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: setup
      port: 3000
      targetPort: setup
      protocol: TCP
