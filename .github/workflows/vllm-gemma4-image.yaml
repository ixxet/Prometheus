name: Build vLLM Gemma 4 Image

on:
  push:
    branches:
      - main
    paths:
      - "services/vllm-gemma4/**"
      - ".github/workflows/vllm-gemma4-image.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./services/vllm-gemma4
          file: ./services/vllm-gemma4/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/prometheus-vllm-gemma4:gemma4-dev
            ghcr.io/${{ github.repository_owner }}/prometheus-vllm-gemma4:sha-${{ github.sha }}
